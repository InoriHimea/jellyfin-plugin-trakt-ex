name: Publish Plugin (Jellyfin 10.10 Compat)

on:
  push:
    tags:
      - 'v*-compat*'
      - 'v*-10.10*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v30.0.0.1-compat-10.10)'
        required: true
        default: 'v30.0.0.1-compat-10.10'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set release tag, version and changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi
          RAW_VERSION=$(printf '%s' "$RELEASE_TAG" | sed -E 's/^v//; s/-.*$//')
          PLUGIN_VERSION=$(printf '%s' "$RAW_VERSION" | awk -F. '{printf "%d.%d.%d.%d", $1, $2, $3, $4}')
          CHANGELOG=$(git tag -l --format='%(contents:subject)' "$RELEASE_TAG")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Jellyfin 10.10 compatible build ${PLUGIN_VERSION}."
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "PLUGIN_VERSION=${PLUGIN_VERSION}" >> "$GITHUB_ENV"
          echo "CHANGELOG=${CHANGELOG}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore Trakt/Trakt.csproj

      - name: Build
        run: dotnet publish Trakt/Trakt.csproj -c Release -o dist/

      - name: Package
        run: |
          cd dist
          zip "trakt_${PLUGIN_VERSION}.zip" Trakt.dll
          echo "PLUGIN_MD5=$(md5sum "trakt_${PLUGIN_VERSION}.zip" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Trakt ${{ env.PLUGIN_VERSION }} (Jellyfin 10.10 Compat)
          body: |
            ## Trakt ${{ env.PLUGIN_VERSION }} - Jellyfin 10.10 Compatible

            ${{ env.CHANGELOG }}

            Based on upstream v30 with 10.10 compatibility changes:
            - Reverted Jellyfin.Database.Implementations namespaces to Jellyfin.Data
            - Reverted GetUsers() to Users property (10.10 IUserManager API)
            - Targets net8.0 / targetAbi 10.10.0.0

            Add to Jellyfin - Admin, Plugins, Repositories:
            https://raw.githubusercontent.com/${{ github.repository }}/master/repo/manifest.json
          files: dist/trakt_${{ env.PLUGIN_VERSION }}.zip
          make_latest: true

      - name: Update manifest.json on master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/trakt_${PLUGIN_VERSION}.zip"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p repo
          if [ ! -f repo/manifest.json ]; then
            jq -n '[{
              "category": "General",
              "guid": "4fe3201e-d6ae-4f2e-8917-e12bda571281",
              "name": "Trakt",
              "description": "Record your watched media with Trakt.",
              "overview": "Record your watched media with Trakt",
              "owner": "jellyfin",
              "versions": []
            }]' > repo/manifest.json
          fi
          jq \
            --arg version "$PLUGIN_VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg sourceUrl "$SOURCE_URL" \
            --arg checksum "$PLUGIN_MD5" \
            --arg timestamp "$TIMESTAMP" \
            '.[0].versions |= ([{
              "version": $version,
              "changelog": $changelog,
              "targetAbi": "10.10.0.0",
              "sourceUrl": $sourceUrl,
              "checksum": $checksum,
              "timestamp": $timestamp
            }] + map(select(.version != $version)))' \
            repo/manifest.json > repo/manifest.json.tmp
          mv repo/manifest.json.tmp repo/manifest.json
          echo "Updated manifest.json:"
          cat repo/manifest.json
          git add repo/manifest.json
          git diff --staged --quiet || git commit -m "ci: update manifest.json for ${RELEASE_TAG}"
          git push origin master
